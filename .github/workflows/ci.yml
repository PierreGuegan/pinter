name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn clean verify

      - name: Build Docker image
        run: docker build -t pinter .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag image
        run: docker tag pinter ${{ secrets.DOCKER_USERNAME }}/pinter:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pinter:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/pinter:latest
            docker stop pinter || true
            docker rm pinter || true
            docker run -d -p 8080:8080 --name pinter ${{ secrets.DOCKER_USERNAME }}/pinter:latest