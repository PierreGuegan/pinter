services:
  db:
    image: mysql:8.0
    container_name: pinter-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pinter
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: pinter-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy